<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Neural Voice Studio</h1>
            <p>Generate lifelike speech using Azure Cognitive Services</p>
        </header>

        <main class="glass-panel">
            <div class="input-group">
                <label for="voice-select">Select Voice Profile</label>
                <div class="custom-select-wrapper">
                    <select id="voice-select">
                        <option value="en-US-Aria:DragonHDOmniLatestNeural">Aria (Female) - Omni HD</option>
                        <option value="en-US-Andrew:DragonHDOmniLatestNeural">Andrew (Male) - Omni HD</option>
                        <option value="en-US-Jenny:DragonHDOmniLatestNeural">Jenny (Female) - Omni HD</option>
                        <option value="en-US-Brian:DragonHDOmniLatestNeural">Brian (Male) - Omni HD</option>
                        <option value="en-US-Ava:DragonHDOmniLatestNeural">Ava (Female) - Omni HD</option>
                        <option value="en-US-Emma:DragonHDOmniLatestNeural">Emma (Female) - Omni HD</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="text-input">Text to Synthesize</label>
                <textarea id="text-input" placeholder="Type or paste the text you want to synthesize here..."></textarea>
            </div>

            <div class="actions">
                <button id="generate-btn" class="primary-btn">
                    <span class="btn-text">Generate Audio</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <div id="audio-container" class="audio-container hidden">
                <h3>Generated Output</h3>
                <audio id="audio-player" controls></audio>
            </div>
            
            <div id="error-message" class="error-message hidden"></div>
            
            <div class="history-container">
                <h3>Generation History</h3>
                <div id="history-list" class="history-list">
                    <!-- History items will be injected here by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
